services:
  - type: web
    name: task-manager-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: task-manager-db
          property: connectionString
      - key: RESEND_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: REMINDER_BATCH_INTERVAL
        value: "60"

  - type: web
    name: task-manager-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: task-manager-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: "/*"
        destination: /index.html

databases:
  - name: task-manager-db
    databaseName: taskmanager
    plan: free
